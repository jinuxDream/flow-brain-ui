<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffb700"/>
      <stop offset="100%" style="stop-color:#d4a400"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ffd700" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" rx="20" fill="url(#bgGrad)"/>
  
  <!-- 星辰轨迹 - 代表天 -->
  <g opacity="0.6">
    <circle cx="40" cy="40" r="2" fill="#ffd700"/>
    <circle cx="160" cy="40" r="2" fill="#ffd700"/>
    <circle cx="30" cy="100" r="1.5" fill="#ffd700"/>
    <circle cx="170" cy="100" r="1.5" fill="#ffd700"/>
    <circle cx="50" cy="160" r="1.5" fill="#ffd700"/>
    <circle cx="150" cy="160" r="1.5" fill="#ffd700"/>
  </g>
  
  <!-- 主图形 - 天策印 -->
  <g transform="translate(100, 90)" filter="url(#shadow)">
    <!-- 外框 - 方印造型 -->
    <rect x="-45" y="-45" width="90" height="90" rx="8" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
    
    <!-- 内框 -->
    <rect x="-38" y="-38" width="76" height="76" rx="5" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
    
    <!-- 天字 - 篆书风格 -->
    <text x="0" y="15" text-anchor="middle" font-family="KaiTi, STKaiti, SimSun, serif" font-size="52" font-weight="bold" fill="url(#goldGrad)">天</text>
  </g>
  
  <!-- 策字 - 小字 -->
  <text x="100" y="155" text-anchor="middle" font-family="KaiTi, STKaiti, SimSun, serif" font-size="24" fill="url(#goldGrad)" opacity="0.9">策</text>
  
  <!-- 英文名 -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" letter-spacing="4" opacity="0.8">TIANCE</text>
</svg>